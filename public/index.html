<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#07070e"/>
<title>MatchGo Pro ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070e;--card:#0f0f1c;--border:#1a1a2e;--text:#ffffff;--sub:#444466;
  --accent:#00ff85;--accent2:#00c4ff;--nav:#07070ef0;
}
.light{
  --bg:#f0f2f5;--card:#ffffff;--border:#e0e0e0;--text:#111111;--sub:#888888;
  --accent:#00aa55;--accent2:#0088cc;--nav:#fffffff0;
}
body{background:var(--bg);color:var(--text);font-family:'Barlow Condensed',sans-serif;min-height:100vh;overflow-x:hidden;transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

@keyframes ping{75%,100%{transform:scale(2.2);opacity:0}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideIn{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}

#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeIn .3s ease}
.splash-logo{width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,#00ff85,#00c4ff);display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 0 40px #00ff8440;animation:popIn .5s ease}
.splash-title{font-size:36px;font-weight:900;letter-spacing:3px;color:var(--text)}
.splash-title span{color:#00ff85}
.splash-sub{font-size:11px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:1px}
.splash-bar{width:120px;height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px}
.splash-progress{height:100%;background:linear-gradient(90deg,#00ff85,#00c4ff);border-radius:2px;animation:splashLoad 1.8s ease forwards}
@keyframes splashLoad{from{width:0}to{width:100%}}

/* ── HEADER ── */
#header{padding:14px 16px 0;animation:fadeUp .4s ease;position:sticky;top:0;background:var(--bg);z-index:40;border-bottom:1px solid transparent;transition:border-color .3s}
#header.scrolled{border-color:var(--border)}
.header-row{display:flex;justify-content:space-between;align-items:center;gap:8px}
.logo-area{display:flex;align-items:center;gap:10px}
.logo-icon{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#00ff85,#00c4ff);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 16px #00ff8430;flex-shrink:0}
.logo-text{font-size:22px;font-weight:900;letter-spacing:2px;line-height:1}
.logo-text span{color:#00ff85}
.logo-sub{font-size:7px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-top:1px}
.header-actions{display:flex;align-items:center;gap:6px}
.icon-btn{background:var(--card);border:1px solid var(--border);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.icon-btn:active{transform:scale(.92)}
.profile-btn{width:34px;height:34px;border-radius:10px;overflow:hidden;border:2px solid var(--accent);cursor:pointer;flex-shrink:0;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:16px}
.profile-btn img{width:100%;height:100%;object-fit:cover}

/* Countdown */
.ring-wrap{position:relative;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-num{font-family:'DM Mono',monospace;font-size:9px;color:var(--accent);font-weight:700;z-index:1}

/* Clock */
.clock-box{text-align:right}
.clock-time{font-family:'DM Mono',monospace;font-size:12px;color:var(--text);font-weight:500;line-height:1}
.clock-date{font-size:7px;color:var(--sub);font-family:'DM Mono',monospace}

/* ── STATS ── */
.stats-row{display:flex;gap:6px;margin-top:10px}
.stat-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 4px;text-align:center;cursor:pointer;transition:all .2s}
.stat-card:active{transform:scale(.95)}
.stat-val{font-size:17px;font-weight:900;line-height:1}
.stat-lbl{font-size:7px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:2px;letter-spacing:.3px}

/* ── TICKER ── */
#ticker{height:24px;overflow:hidden;display:flex;align-items:center;margin-top:8px;background:var(--card);border-radius:8px}
.ticker-pill{background:var(--accent);color:#000;font-size:8px;font-family:'DM Mono',monospace;font-weight:700;padding:0 8px;height:100%;display:flex;align-items:center;border-radius:8px 0 0 8px;flex-shrink:0}
.ticker-scroll{overflow:hidden;flex:1}
.ticker-inner{display:inline-block;white-space:nowrap;animation:ticker 30s linear infinite;font-size:9px;color:var(--accent);font-family:'DM Mono',monospace;letter-spacing:.4px;padding:0 8px}

/* ── MAIN NAV ── */
#main-nav{padding:8px 16px 0}
.main-tabs{display:flex;background:var(--card);border-radius:14px;padding:3px;gap:2px;border:1px solid var(--border)}
.main-tab{flex:1;padding:7px 2px;border-radius:11px;border:none;background:transparent;color:var(--sub);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;position:relative}
.main-tab.active{background:var(--bg);color:var(--text);box-shadow:0 2px 8px #00000040}
.tab-dot{position:absolute;top:3px;right:5px;width:6px;height:6px;border-radius:50%;background:#ff3a3a;display:none}

/* ── MATCHES ── */
#content{flex:1;padding:8px 16px 90px;display:flex;flex-direction:column;gap:7px}

/* Match Card */
.mcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 14px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;animation:fadeUp .3s ease both}
.mcard:active{transform:scale(.98)}
.card-glow{position:absolute;top:0;left:0;right:0;height:2px;animation:shimmer 2.5s ease infinite}
.card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.card-league-info{display:flex;align-items:center;gap:4px}
.league-flag{font-size:10px}
.league-name{font-size:8px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:.3px;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.src-chip{font-size:6px;padding:1px 4px;border-radius:3px;font-family:'DM Mono',monospace;font-weight:700;flex-shrink:0}
.card-right{display:flex;align-items:center;gap:4px}
.live-badge{display:flex;align-items:center;gap:3px;background:#ff000018;border:1px solid #ff000033;border-radius:5px;padding:2px 5px}
.live-min{font-size:9px;font-family:'DM Mono',monospace;font-weight:700}
.ft-chip{font-size:8px;color:var(--sub);font-family:'DM Mono',monospace;background:var(--border);padding:2px 6px;border-radius:4px}
.ns-chip{font-size:8px;color:#00c4ff;font-family:'DM Mono',monospace}

.card-body{display:flex;align-items:center;gap:8px}
.team-col{flex:1;display:flex;flex-direction:column;gap:4px}
.team-col.left{align-items:flex-start}
.team-col.right{align-items:flex-end}
.team-crest{width:30px;height:30px;object-fit:contain}
.team-nm{font-size:11px;color:var(--text);font-weight:700;letter-spacing:.3px;text-transform:uppercase;line-height:1.1}
.score-center{display:flex;flex-direction:column;align-items:center;min-width:65px;gap:2px}
.score-nums{font-size:30px;font-weight:900;letter-spacing:3px;line-height:1;display:flex;align-items:center}
.score-sep{color:var(--border);font-size:20px;margin:0 2px}
.vs-txt{font-size:13px;color:var(--border);font-family:'DM Mono',monospace}
.live-indicator{font-size:7px;font-family:'DM Mono',monospace;padding:1px 5px;border-radius:3px}
.card-venue{margin-top:6px;font-size:7px;color:var(--sub);font-family:'DM Mono',monospace;text-align:center;opacity:.6;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── STANDINGS ── */
.standings-wrap{animation:fadeUp .3s ease}
.comp-picker{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:10px}
.comp-picker::-webkit-scrollbar{display:none}
.comp-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0}
.comp-btn.active{border-color:var(--accent);background:var(--accent)18;color:var(--accent)}
.standings-table{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.st-head{display:grid;grid-template-columns:28px 1fr 28px 28px 28px 28px 36px;gap:4px;padding:8px 12px;border-bottom:1px solid var(--border)}
.st-head span{font-size:8px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:.5px;text-align:center}
.st-head span:nth-child(2){text-align:left}
.st-row{display:grid;grid-template-columns:28px 1fr 28px 28px 28px 28px 36px;gap:4px;padding:9px 12px;border-bottom:1px solid var(--border)18;align-items:center;transition:background .2s}
.st-row:last-child{border:none}
.st-row:active{background:var(--border)40}
.st-pos{font-size:11px;font-weight:800;text-align:center;font-family:'DM Mono',monospace}
.st-team{display:flex;align-items:center;gap:6px}
.st-crest{width:18px;height:18px;object-fit:contain}
.st-name{font-size:11px;color:var(--text);font-weight:600}
.st-num{font-size:11px;text-align:center;color:var(--sub);font-family:'DM Mono',monospace}
.st-pts{font-size:13px;font-weight:900;text-align:center;color:var(--text);font-family:'DM Mono',monospace}

/* ── PROFILE ── */
.profile-page{animation:fadeUp .3s ease;padding:0}
.profile-hero{background:linear-gradient(135deg,#00ff8520,#00c4ff10);border:1px solid var(--border);border-radius:16px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:12px;position:relative}
.profile-avatar-wrap{position:relative;cursor:pointer}
.profile-avatar{width:80px;height:80px;border-radius:50%;border:3px solid var(--accent);object-fit:cover;display:flex;align-items:center;justify-content:center;background:var(--card);font-size:36px;overflow:hidden}
.avatar-edit{position:absolute;bottom:0;right:0;background:var(--accent);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;border:2px solid var(--bg)}
.profile-name{font-size:20px;font-weight:800;color:var(--text);letter-spacing:.5px}
.profile-handle{font-size:10px;color:var(--sub);font-family:'DM Mono',monospace}
.profile-edit-form{width:100%}
.profile-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:14px;margin-bottom:8px;outline:none;transition:border-color .2s}
.profile-input:focus{border-color:var(--accent)}
.profile-save-btn{width:100%;padding:10px;border-radius:10px;border:none;background:linear-gradient(135deg,#00ff85,#00c4ff);color:#000;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;cursor:pointer;letter-spacing:.5px}
.profile-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.pstat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center}
.pstat-val{font-size:20px;font-weight:900;color:var(--accent)}
.pstat-lbl{font-size:8px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:2px}
.fav-leagues{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.section-title{font-size:13px;font-weight:800;color:var(--text);letter-spacing:.5px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.fav-list{display:flex;flex-wrap:wrap;gap:6px}
.fav-chip{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Mono',monospace;font-size:9px;cursor:pointer;transition:all .2s}
.fav-chip.on{border-color:var(--accent);background:var(--accent)18;color:var(--accent)}

/* ── SETTINGS SHEET ── */
.sheet-overlay{position:fixed;inset:0;background:#000000cc;z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(8px)}
.sheet-overlay.open{display:flex;animation:fadeIn .2s ease}
.sheet-panel{width:100%;max-width:480px;background:var(--card);border-top:1px solid var(--border);border-radius:24px 24px 0 0;padding:0 20px 50px;max-height:88vh;overflow-y:auto;animation:slideIn .3s cubic-bezier(.4,0,.2,1)}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--border);margin:12px auto 0}
.sheet-title{font-size:20px;font-weight:900;letter-spacing:1px;color:var(--text);margin:16px 0 4px}
.sheet-sub{font-size:8px;color:var(--sub);font-family:'DM Mono',monospace;margin-bottom:20px}
.setting-section{margin-bottom:18px}
.setting-label{font-size:9px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:8px;text-transform:uppercase}
.setting-row{display:flex;justify-content:space-between;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px}
.setting-row-left{display:flex;flex-direction:column;gap:2px}
.setting-row-title{font-size:13px;font-weight:700;color:var(--text)}
.setting-row-sub{font-size:8px;color:var(--sub);font-family:'DM Mono',monospace}
.toggle{width:44px;height:24px;border-radius:12px;cursor:pointer;position:relative;transition:background .3s;border:none;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle.off{background:var(--border)}
.toggle-knob{position:absolute;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 1px 4px #00000040}
.toggle.on .toggle-knob{left:23px}
.toggle.off .toggle-knob{left:3px}
.refresh-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.r-btn{padding:9px 4px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--sub);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all .2s;text-align:center}
.r-btn.active{border-color:var(--accent);background:var(--accent)18;color:var(--accent)}
.src-row{display:flex;align-items:center;gap:10px;background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:6px}
.src-dot{flex-shrink:0}
.src-info{flex:1}
.src-name-txt{font-size:11px;color:var(--text);font-family:'DM Mono',monospace}
.src-detail-txt{font-size:8px;color:var(--sub);font-family:'DM Mono',monospace;margin-top:1px}
.src-status-txt{font-size:9px;font-family:'DM Mono',monospace;font-weight:700}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.theme-btn{padding:12px;border-radius:12px;border:1px solid var(--border);cursor:pointer;background:var(--bg);transition:all .2s;text-align:center}
.theme-btn.active{border-color:var(--accent)}
.theme-icon{font-size:22px;margin-bottom:4px}
.theme-name{font-size:10px;font-family:'DM Mono',monospace;color:var(--sub)}
.theme-btn.active .theme-name{color:var(--accent)}

/* ── DETAIL SHEET ── */
.detail-header{display:flex;justify-content:space-between;align-items:center;padding:16px 0 0}
.detail-league{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--sub);font-family:'DM Mono',monospace}
.close-btn{background:var(--border);border:none;color:var(--sub);width:28px;height:28px;border-radius:50%;cursor:pointer;font-size:14px}
.detail-score-row{display:flex;justify-content:space-between;align-items:center;padding:16px 0 20px}
.detail-team{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px}
.detail-logo{width:56px;height:56px;object-fit:contain;filter:drop-shadow(0 4px 12px #00000060)}
.detail-name{font-size:13px;font-weight:800;color:var(--text);text-transform:uppercase;text-align:center;letter-spacing:.4px}
.detail-score-mid{display:flex;flex-direction:column;align-items:center;gap:5px}
.detail-score{font-size:48px;font-weight:900;letter-spacing:5px;line-height:1;display:flex;align-items:center}
.detail-sep{color:var(--border);font-size:32px;margin:0 3px}
.info-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:7px}
.info-box-label{font-size:7px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:.5px;margin-bottom:3px}
.info-box-val{font-size:12px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-weight:600;display:flex;align-items:center;gap:6px}

/* ── BOTTOM NAV ── */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--nav);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:6px 0 18px;z-index:50}
.bnav-btn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:2px 0;position:relative}
.bnav-icon{font-size:20px;transition:transform .2s}
.bnav-btn.active .bnav-icon{transform:scale(1.15)}
.bnav-label{font-size:7px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:.3px}
.bnav-btn.active .bnav-label{color:var(--accent)}
.bnav-dot{position:absolute;top:0;right:calc(50% - 14px);width:6px;height:6px;border-radius:50%;background:#ff3a3a;display:none}

/* ── DOT ── */
.dot{position:relative;display:inline-flex;flex-shrink:0}
.dot-ping{position:absolute;inset:0;border-radius:50%;opacity:.5;animation:ping 1.4s ease infinite}
.dot-core{border-radius:50%;display:block}

/* ── STATES ── */
.state-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px;min-height:200px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
.state-txt{font-size:10px;color:var(--sub);font-family:'DM Mono',monospace;letter-spacing:1px;text-align:center}
.retry-btn{padding:8px 20px;border-radius:10px;border:1px solid var(--accent)44;background:var(--accent)18;color:var(--accent);font-family:'DM Mono',monospace;font-size:10px;cursor:pointer}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">⚽</div>
  <div class="splash-title">Match<span>Go</span></div>
  <div class="splash-sub">LIVE FOOTBALL • PRO</div>
  <div class="splash-bar"><div class="splash-progress"></div></div>
</div>

<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div class="header-row">
      <div class="logo-area">
        <div class="logo-icon">⚽</div>
        <div>
          <div class="logo-text">Match<span>Go</span></div>
          <div class="logo-sub" id="logo-sub">LIVE FOOTBALL</div>
        </div>
      </div>
      <div class="header-actions">
        <div class="ring-wrap">
          <svg viewBox="0 0 34 34">
            <circle cx="17" cy="17" r="14" fill="none" stroke="var(--border)" stroke-width="2"/>
            <circle id="ring" cx="17" cy="17" r="14" fill="none" stroke="var(--accent)" stroke-width="2" stroke-dasharray="0 88" stroke-linecap="round" style="transition:stroke-dasharray 1s linear"/>
          </svg>
          <span class="ring-num" id="ring-num">15</span>
        </div>
        <div class="clock-box">
          <div class="clock-time" id="clock">00:00:00</div>
          <div class="clock-date" id="sync-time">connecting...</div>
        </div>
