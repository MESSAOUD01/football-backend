<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MatchPulse ⚽</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
</head>
<body style="background:#07090f;color:#ddeeff;font-family:Cairo,sans-serif;margin:0;display:flex;flex-direction:column;height:100vh;overflow:hidden">

<header style="display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid rgba(0,212,255,0.1);background:rgba(7,9,15,0.97);position:sticky;top:0;z-index:50">
<div style="display:flex;align-items:center;gap:9px">
<div style="width:34px;height:34px;background:linear-gradient(135deg,#00d4ff,#0077aa);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px">⚽</div>
<span style="font-family:Bebas Neue,sans-serif;font-size:24px;letter-spacing:2px;background:linear-gradient(90deg,#00d4ff,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">MATCHPULSE</span>
</div>
<div style="display:flex;align-items:center;gap:6px;background:rgba(255,51,85,0.12);border:1px solid rgba(255,51,85,0.35);border-radius:20px;padding:4px 11px;font-size:11px;font-weight:700;color:#ff3355">
<div style="width:6px;height:6px;background:#ff3355;border-radius:50%;animation:blink 1.1s infinite"></div>LIVE
</div>
</header>

<div style="display:flex;border-bottom:1px solid rgba(0,212,255,0.1);background:#0d1220">
<button onclick="setTab('LIVE',this)" style="flex:1;padding:11px;font-size:13px;font-weight:700;color:#00d4ff;border:none;background:none;border-bottom:2px solid #00d4ff;cursor:pointer">🔴 مباشر</button>
<button onclick="setTab('SCHEDULED',this)" style="flex:1;padding:11px;font-size:13px;font-weight:700;color:#4a6580;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer">📅 القادمة</button>
<button onclick="setTab('FINISHED',this)" style="flex:1;padding:11px;font-size:13px;font-weight:700;color:#4a6580;border:none;background:none;border-bottom:2px solid transparent;cursor:pointer">✅ النتائج</button>
</div>

<div style="flex:1;overflow-y:auto;padding:10px 12px 80px" id="content">
<div id="loader" style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:60px 0">
<div style="width:38px;height:38px;border:3px solid rgba(0,212,255,0.1);border-top-color:#00d4ff;border-radius:50%;animation:spin .8s linear infinite"></div>
<p style="color:#4a6580;font-size:13px">جارٍ تحميل المباريات...</p>
</div>
<div id="matchList" style="display:none"></div>
</div>

<div style="display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(7,9,15,.97);border-top:1px solid rgba(0,212,255,0.1)">
<button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px;font-size:9px;color:#00d4ff;border:none;background:none">⚽<span>مباريات</span></button>
<button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px;font-size:9px;color:#4a6580;border:none;background:none">🏆<span>ترتيب</span></button>
<button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px;font-size:9px;color:#4a6580;border:none;background:none">📊<span>إحصاء</span></button>
<button style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px;font-size:9px;color:#4a6580;border:none;background:none">🔔<span>تنبيه</span></button>
</div>

<style>
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.mc{background:#111827;border:1px solid rgba(0,212,255,0.1);border-radius:13px;padding:13px;margin-bottom:8px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;animation:fadeUp .3s ease both}
.mc.live{border-color:rgba(255,51,85,.3);background:linear-gradient(135deg,#111827,#140f1a)}
.team{display:flex;flex-direction:column;align-items:center;gap:5px;text-align:center}
.logo{width:40px;height:40px;object-fit:contain}
.tname{font-size:12px;font-weight:700;max-width:76px;line-height:1.2}
.sc{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:76px}
.snum{font-family:'Bebas Neue',sans-serif;font-size:30px;letter-spacing:3px;color:#fff;line-height:1}
.stime{font-size:10px;font-weight:700}
.tlive{color:#ff3355;animation:blink 1.2s infinite}
.tsched{color:#00d4ff}.tdone{color:#4a6580}
</style>

<script>
const PROXY="https://football-backend-umber.vercel.app";
let currentStatus="LIVE";

async function loadMatches(){
  document.getElementById("loader").style.display="flex";
  document.getElementById("matchList").style.display="none";
  try{
    const p=currentStatus==="LIVE"?{status:"IN_PLAY,PAUSED,HALFTIME"}:{status:currentStatus,dateFrom:new Date().toISOString().slice(0,10),dateTo:new Date().toISOString().slice(0,10)};
    const qs=new URLSearchParams(p).toString();
    const r=await fetch(`${PROXY}/api/football?path=/matches&${qs}`);
    const d=await r.json();
    render(d.matches||[]);
  }catch(e){
    document.getElementById("matchList").innerHTML='<div style="text-align:center;padding:40px;color:#ff3355">⚠️ تعذر الاتصال</div>';
  }
  document.getElementById("loader").style.display="none";
  document.getElementById("matchList").style.display="block";
}

function render(matches){
  if(!matches.length){
    document.getElementById("matchList").innerHTML='<div style="text-align:center;padding:50px;color:#4a6580"><div style="font-size:44px;opacity:.4">⚽</div><p>لا توجد مباريات</p></div>';
    return;
  }
  const groups={};
  matches.forEach(m=>{const k=m.competition?.id||"?";if(!groups[k])groups[k]={name:m.competition?.name,matches:[]};groups[k].matches.push(m);});
  let html="";
  Object.values(groups).forEach(g=>{
    html+=`<div style="display:flex;align-items:center;gap:8px;margin:14px 0 7px"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#4a6580">${g.name||"بطولة"}</span><div style="flex:1;height:1px;background:rgba(0,212,255,0.1)"></div></div>`;
    g.matches.forEach((m,i)=>{html+=card(m,i);});
  });
  document.getElementById("matchList").innerHTML=html;
}

function card(m,i){
  const isLive=["IN_PLAY","PAUSED","HALFTIME"].includes(m.status);
  const isDone=m.status==="FINISHED";
  const hs=m.score?.fullTime?.home??m.score?.halfTime?.home;
  const as=m.score?.fullTime?.away??m.score?.halfTime?.away;
  const score=(isLive||isDone)&&hs!==null?`${hs}–${as}`:"vs";
  let tclass="tsched",tlabel="";
  if(isLive){tclass="tlive";tlabel=m.minute?`🔴 ${m.minute}'`:"🔴 مباشر";}
  else if(isDone){tclass="tdone";tlabel="انتهت";}
  else{tlabel=new Date(m.utcDate).toLocaleTimeString("ar",{hour:"2-digit",minute:"2-digit",hour12:false});}
  const hl=m.homeTeam?.crest?`<img class="logo" src="${m.homeTeam.crest}" onerror="this.style.display='none'">`:"⚽";
  const al=m.awayTeam?.crest?`<img class="logo" src="${m.awayTeam.crest}" onerror="this.style.display='none'">`:"⚽";
  return`<div class="mc ${isLive?"live":""}" style="animation-delay:${i*.06}s">
    <div class="team">${hl}<div class="tname">${m.homeTeam?.shortName||m.homeTeam?.name||"؟"}</div></div>
    <div class="sc"><div class="snum">${score}</div><div class="stime ${tclass}">${tlabel}</div><div style="font-size:9px;color:#4a6580">${m.competition?.name||""}</div></div>
    <div class="team">${al}<div class="tname">${m.awayTeam?.shortName||m.awayTeam?.name||"؟"}</div></div>
  </div>`;
}

function setTab(s,btn){
  currentStatus=s;
  document.querySelectorAll("button[onclick^='setTab']").forEach(b=>{b.style.color="#4a6580";b.style.borderBottom="2px solid transparent";});
  btn.style.color="#00d4ff";btn.style.borderBottom="2px solid #00d4ff";
  loadMatches();
}

loadMatches();
setInterval(()=>{if(currentStatus==="LIVE")loadMatches();},45000);
</script>
</body>
</html>
